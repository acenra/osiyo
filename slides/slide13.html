<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<style>

body{
margin:0;
background:black;
width:1280px;
height:720px;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

</style>

</head>

<body>

<video id="video" autoplay muted playsinline>

<source src="../OSIYO.mp4" type="video/mp4">

</video>


<script>

const video = document.getElementById("video")

function startVideo(){

video.currentTime = 0   // перемотка
video.play().catch(()=>{})

}

startVideo()

video.onended = () => {

parent.postMessage("videoEnded","*")

}

</script>

</body>
</html>
